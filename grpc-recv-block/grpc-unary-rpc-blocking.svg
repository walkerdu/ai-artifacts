<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 750">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
</style>
<defs>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e8ecf0" stroke-width="0.5"/>
  </pattern>
  <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
  </marker>
  <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
  </marker>
  <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
  </marker>
  <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
  </marker>
  <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
  </marker>
  <marker id="arrow-open" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polyline points="0 0, 10 3.5, 0 7" fill="none" stroke="#6b7280" stroke-width="1.5"/>
  </marker>
</defs>

<!-- Background -->
<rect width="100%" height="100%" fill="#fafbfc"/>
<rect width="100%" height="100%" fill="url(#grid)"/>

<!-- Title -->
<text x="450" y="30" fill="#1f2937" font-size="16" font-weight="700" text-anchor="middle">gRPC Unary RPC 客户端挂起等待回包机制</text>
<text x="450" y="50" fill="#6b7280" font-size="9" text-anchor="middle">用户 goroutine 阻塞在 stream.recvBuffer 的 channel 上，transport 读 goroutine 收到数据后唤醒</text>

<!-- ===== Actor Boxes ===== -->
<!-- Actor 1: 用户 goroutine -->
<rect x="80" y="70" width="160" height="45" rx="6" fill="#fafbfc"/>
<rect x="80" y="70" width="160" height="45" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
<text x="160" y="90" fill="#1e40af" font-size="10" font-weight="600" text-anchor="middle">用户 goroutine</text>
<text x="160" y="105" fill="#6b7280" font-size="8" text-anchor="middle">调用方代码</text>

<!-- Actor 2: clientStream -->
<rect x="320" y="70" width="160" height="45" rx="6" fill="#fafbfc"/>
<rect x="320" y="70" width="160" height="45" rx="6" fill="#fff7ed" stroke="#d97706" stroke-width="1.5"/>
<text x="400" y="90" fill="#92400e" font-size="10" font-weight="600" text-anchor="middle">clientStream</text>
<text x="400" y="105" fill="#6b7280" font-size="8" text-anchor="middle">stream + recvBuffer</text>

<!-- Actor 3: transport 读 goroutine -->
<rect x="560" y="70" width="180" height="45" rx="6" fill="#fafbfc"/>
<rect x="560" y="70" width="180" height="45" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
<text x="650" y="90" fill="#065f46" font-size="10" font-weight="600" text-anchor="middle">transport 读 goroutine</text>
<text x="650" y="105" fill="#6b7280" font-size="8" text-anchor="middle">conn.Read() 循环</text>

<!-- Actor 4: 远端 Server -->
<rect x="770" y="70" width="100" height="45" rx="6" fill="#fafbfc"/>
<rect x="770" y="70" width="100" height="45" rx="6" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
<text x="820" y="97" fill="#4b5563" font-size="10" font-weight="600" text-anchor="middle">Server</text>

<!-- Lifelines -->
<line x1="160" y1="115" x2="160" y2="700" stroke="#2563eb" stroke-width="1" stroke-dasharray="6,4"/>
<line x1="400" y1="115" x2="400" y2="700" stroke="#d97706" stroke-width="1" stroke-dasharray="6,4"/>
<line x1="650" y1="115" x2="650" y2="700" stroke="#059669" stroke-width="1" stroke-dasharray="6,4"/>
<line x1="820" y1="115" x2="820" y2="700" stroke="#9ca3af" stroke-width="1" stroke-dasharray="6,4"/>

<!-- ===== Messages ===== -->

<!-- 1. SayHello() -->
<circle cx="140" cy="150" r="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
<text x="140" y="153" fill="#2563eb" font-size="7" font-weight="600" text-anchor="middle">1</text>
<line x1="160" y1="150" x2="395" y2="150" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
<text x="278" y="142" fill="#1e40af" font-size="8" text-anchor="middle">Invoke("SayHello", req)</text>

<!-- Activation bar on clientStream -->
<rect x="395" y="148" width="10" height="120" rx="2" fill="#fff7ed" stroke="#d97706" stroke-width="0.5"/>

<!-- 2. newStream -->
<circle cx="140" cy="190" r="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
<text x="140" y="193" fill="#2563eb" font-size="7" font-weight="600" text-anchor="middle">2</text>
<line x1="400" y1="190" x2="645" y2="190" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
<text x="523" y="182" fill="#92400e" font-size="8" text-anchor="middle">newStream() 注册 stream ID</text>

<!-- 3. sendMsg → HTTP/2 DATA -->
<circle cx="140" cy="230" r="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
<text x="140" y="233" fill="#2563eb" font-size="7" font-weight="600" text-anchor="middle">3</text>
<line x1="400" y1="230" x2="815" y2="230" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
<text x="600" y="222" fill="#92400e" font-size="8" text-anchor="middle">sendMsg(req) → HTTP/2 DATA 帧 → 发送到 Server</text>

<!-- 4. recvMsg → 阻塞 -->
<circle cx="140" cy="275" r="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
<text x="140" y="278" fill="#dc2626" font-size="7" font-weight="600" text-anchor="middle">4</text>
<line x1="160" y1="275" x2="395" y2="275" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>
<text x="278" y="267" fill="#991b1b" font-size="8" text-anchor="middle">recvMsg() → buf.get()</text>

<!-- Block indicator -->
<rect x="100" y="290" width="120" height="180" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1" stroke-dasharray="4,3"/>
<rect x="100" y="290" width="60" height="16" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="0.5"/>
<text x="130" y="301" fill="#dc2626" font-size="7" font-weight="600" text-anchor="middle">阻塞</text>
<text x="160" y="330" fill="#dc2626" font-size="8" text-anchor="middle">select {</text>
<text x="160" y="348" fill="#dc2626" font-size="8" text-anchor="middle">case &lt;-buf.c:</text>
<text x="160" y="366" fill="#dc2626" font-size="8" text-anchor="middle">case &lt;-ctx.Done():</text>
<text x="160" y="384" fill="#dc2626" font-size="8" text-anchor="middle">}</text>
<text x="160" y="410" fill="#6b7280" font-size="8" text-anchor="middle">goroutine 被</text>
<text x="160" y="426" fill="#6b7280" font-size="8" text-anchor="middle">Go runtime 挂起</text>
<text x="160" y="448" fill="#6b7280" font-size="8" text-anchor="middle">不占 CPU</text>

<!-- Transport reader: waiting -->
<rect x="605" y="275" width="90" height="120" rx="4" fill="#ecfdf5" stroke="#059669" stroke-width="0.5"/>
<text x="650" y="295" fill="#065f46" font-size="8" text-anchor="middle">循环读取</text>
<text x="650" y="313" fill="#4b5563" font-size="7" text-anchor="middle">conn.Read()</text>
<text x="650" y="331" fill="#4b5563" font-size="7" text-anchor="middle">解析 frame</text>
<text x="650" y="349" fill="#4b5563" font-size="7" text-anchor="middle">按 streamID</text>
<text x="650" y="367" fill="#4b5563" font-size="7" text-anchor="middle">分发到对应</text>
<text x="650" y="385" fill="#4b5563" font-size="7" text-anchor="middle">stream.buf</text>

<!-- 5. Server responds -->
<circle cx="805" cy="430" r="8" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>
<text x="805" y="433" fill="#6b7280" font-size="7" font-weight="600" text-anchor="middle">5</text>
<line x1="815" y1="430" x2="655" y2="430" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
<text x="735" y="422" fill="#4b5563" font-size="8" text-anchor="middle">HTTP/2 DATA 帧 (resp)</text>

<!-- 6. Transport puts to buffer -->
<circle cx="635" cy="475" r="8" fill="#ecfdf5" stroke="#059669" stroke-width="1"/>
<text x="635" y="478" fill="#059669" font-size="7" font-weight="600" text-anchor="middle">6</text>
<line x1="650" y1="475" x2="405" y2="475" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
<text x="528" y="467" fill="#065f46" font-size="8" text-anchor="middle">stream.buf.put(data)</text>
<text x="528" y="487" fill="#059669" font-size="7" text-anchor="middle">写入 channel → 唤醒用户 goroutine</text>

<!-- 7. User goroutine wakes -->
<circle cx="140" cy="520" r="8" fill="#ecfdf5" stroke="#059669" stroke-width="1"/>
<text x="140" y="523" fill="#059669" font-size="7" font-weight="600" text-anchor="middle">7</text>
<line x1="395" y1="520" x2="165" y2="520" stroke="#059669" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
<text x="278" y="512" fill="#065f46" font-size="8" text-anchor="middle">&lt;-buf.c 返回 data</text>

<!-- 8. Unmarshal -->
<path d="M 160,545 L 200,545 L 200,570 L 160,570" fill="none" stroke="#2563eb" stroke-width="1" marker-end="url(#arrow-blue)"/>
<text x="210" y="560" fill="#1e40af" font-size="8">proto.Unmarshal(data, resp)</text>

<!-- 9. Server sends trailers -->
<circle cx="805" cy="590" r="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1"/>
<text x="805" y="593" fill="#7c3aed" font-size="7" font-weight="600" text-anchor="middle">8</text>
<line x1="815" y1="590" x2="655" y2="590" stroke="#7c3aed" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
<text x="735" y="582" fill="#5b21b6" font-size="8" text-anchor="middle">HEADERS (trailers)</text>
<text x="735" y="602" fill="#6b7280" font-size="7" text-anchor="middle">grpc-status: 0</text>

<!-- 9. Trailers to stream -->
<line x1="650" y1="620" x2="405" y2="620" stroke="#7c3aed" stroke-width="1" marker-end="url(#arrow)"/>
<text x="528" y="612" fill="#5b21b6" font-size="7" text-anchor="middle">stream 标记完成</text>

<!-- 10. Return -->
<line x1="395" y1="650" x2="165" y2="650" stroke="#2563eb" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arrow-blue)"/>
<text x="278" y="642" fill="#1e40af" font-size="8" text-anchor="middle">return resp, nil ✓</text>

<!-- Legend -->
<text x="30" y="700" fill="#4b5563" font-size="8" font-weight="600">LEGEND</text>
<line x1="80" y1="697" x2="110" y2="697" stroke="#2563eb" stroke-width="1.5"/>
<text x="115" y="700" fill="#4b5563" font-size="8">用户调用</text>
<line x1="180" y1="697" x2="210" y2="697" stroke="#059669" stroke-width="1.5"/>
<text x="215" y="700" fill="#4b5563" font-size="8">transport 操作</text>
<line x1="310" y1="697" x2="340" y2="697" stroke="#dc2626" stroke-width="1.5"/>
<text x="345" y="700" fill="#4b5563" font-size="8">阻塞点</text>
<line x1="410" y1="697" x2="440" y2="697" stroke="#6b7280" stroke-width="1" stroke-dasharray="6,3"/>
<text x="445" y="700" fill="#4b5563" font-size="8">返回/响应</text>
<rect x="520" y="690" width="14" height="14" rx="3" fill="#fef2f2" stroke="#dc2626" stroke-width="0.5"/>
<text x="540" y="700" fill="#4b5563" font-size="8">goroutine 挂起（不占 CPU，等 channel）</text>
</svg>