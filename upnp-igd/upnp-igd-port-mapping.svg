<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 620">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', monospace; }
</style>
<defs>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
  </marker>
  <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
  </marker>
  <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
  </marker>
  <marker id="arrow-slate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#0f172a"/>
<rect width="100%" height="100%" fill="url(#grid)"/>

<text x="30" y="30" fill="#e2e8f0" font-size="16" font-weight="700">UPnP IGD Port Mapping — Full Interaction</text>
<text x="30" y="48" fill="#94a3b8" font-size="9">PC (192.168.1.10) maps external port 8080 to local port 80 via UPnP IGD</text>

<!-- Actor: PC -->
<rect x="60" y="70" width="140" height="50" rx="6" fill="#0f172a"/>
<rect x="60" y="70" width="140" height="50" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
<text x="130" y="93" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">PC (CP + Client)</text>
<text x="130" y="109" fill="#94a3b8" font-size="8" text-anchor="middle">192.168.1.10</text>

<!-- Actor: Router -->
<rect x="290" y="70" width="140" height="50" rx="6" fill="#0f172a"/>
<rect x="290" y="70" width="140" height="50" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
<text x="360" y="93" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">Router (IGD)</text>
<text x="360" y="109" fill="#94a3b8" font-size="8" text-anchor="middle">WAN: 86.199.104.6</text>

<!-- Actor: Remote -->
<rect x="520" y="70" width="140" height="50" rx="6" fill="#0f172a"/>
<rect x="520" y="70" width="140" height="50" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
<text x="590" y="93" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">Remote Host</text>
<text x="590" y="109" fill="#94a3b8" font-size="8" text-anchor="middle">Internet</text>

<!-- Lifelines -->
<line x1="130" y1="120" x2="130" y2="580" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>
<line x1="360" y1="120" x2="360" y2="580" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>
<line x1="590" y1="120" x2="590" y2="580" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>

<!-- Phase: Discovery -->
<rect x="45" y="140" width="630" height="130" rx="4" fill="none" stroke="#60a5fa" stroke-width="0.8" stroke-dasharray="4,3"/>
<rect x="45" y="140" width="80" height="18" rx="4" fill="rgba(30,41,59,0.8)" stroke="#60a5fa" stroke-width="0.8"/>
<text x="85" y="153" fill="#60a5fa" font-size="8" font-weight="600" text-anchor="middle">Discovery</text>

<!-- 1: M-SEARCH -->
<circle cx="112" cy="175" r="9" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1"/>
<text x="112" y="178" fill="#60a5fa" font-size="7" font-weight="600" text-anchor="middle">1</text>
<line x1="130" y1="175" x2="355" y2="175" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
<text x="242" y="167" fill="#e2e8f0" font-size="9" text-anchor="middle">M-SEARCH (multicast)</text>

<!-- 2: Response -->
<circle cx="112" cy="220" r="9" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1"/>
<text x="112" y="223" fill="#60a5fa" font-size="7" font-weight="600" text-anchor="middle">2</text>
<line x1="355" y1="220" x2="135" y2="220" stroke="#34d399" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arrow-emerald)"/>
<text x="242" y="212" fill="#94a3b8" font-size="8" text-anchor="middle" font-style="italic">200 OK + LOCATION URL</text>

<!-- Note -->
<rect x="380" y="160" width="170" height="30" rx="4" fill="rgba(30,41,59,0.6)" stroke="#475569" stroke-width="0.5"/>
<text x="465" y="173" fill="#94a3b8" font-size="7" text-anchor="middle">Router also periodically</text>
<text x="465" y="183" fill="#94a3b8" font-size="7" text-anchor="middle">sends NOTIFY ssdp:alive</text>

<!-- Phase: Description -->
<rect x="45" y="280" width="630" height="110" rx="4" fill="none" stroke="#34d399" stroke-width="0.8" stroke-dasharray="4,3"/>
<rect x="45" y="280" width="90" height="18" rx="4" fill="rgba(30,41,59,0.8)" stroke="#34d399" stroke-width="0.8"/>
<text x="90" y="293" fill="#34d399" font-size="8" font-weight="600" text-anchor="middle">Description</text>

<!-- 3: GET description -->
<circle cx="112" cy="315" r="9" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1"/>
<text x="112" y="318" fill="#60a5fa" font-size="7" font-weight="600" text-anchor="middle">3</text>
<line x1="130" y1="315" x2="355" y2="315" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
<text x="242" y="307" fill="#e2e8f0" font-size="9" text-anchor="middle">GET /rootDesc.xml</text>

<!-- 4: XML response -->
<circle cx="112" cy="355" r="9" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1"/>
<text x="112" y="358" fill="#60a5fa" font-size="7" font-weight="600" text-anchor="middle">4</text>
<line x1="355" y1="355" x2="135" y2="355" stroke="#34d399" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arrow-emerald)"/>
<text x="242" y="347" fill="#94a3b8" font-size="8" text-anchor="middle" font-style="italic">XML: controlURL=/ctl/IPConn</text>

<!-- Phase: Control -->
<rect x="45" y="400" width="630" height="100" rx="4" fill="none" stroke="#fbbf24" stroke-width="0.8" stroke-dasharray="4,3"/>
<rect x="45" y="400" width="70" height="18" rx="4" fill="rgba(30,41,59,0.8)" stroke="#fbbf24" stroke-width="0.8"/>
<text x="80" y="413" fill="#fbbf24" font-size="8" font-weight="600" text-anchor="middle">Control</text>

<!-- 5: AddPortMapping -->
<circle cx="112" cy="435" r="9" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1"/>
<text x="112" y="438" fill="#60a5fa" font-size="7" font-weight="600" text-anchor="middle">5</text>
<line x1="130" y1="435" x2="355" y2="435" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
<text x="242" y="427" fill="#e2e8f0" font-size="9" text-anchor="middle">SOAP: AddPortMapping(8080/TCP)</text>

<!-- 6: OK -->
<circle cx="112" cy="472" r="9" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1"/>
<text x="112" y="475" fill="#60a5fa" font-size="7" font-weight="600" text-anchor="middle">6</text>
<line x1="355" y1="472" x2="135" y2="472" stroke="#34d399" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arrow-emerald)"/>
<text x="242" y="464" fill="#94a3b8" font-size="8" text-anchor="middle" font-style="italic">200 OK — NAT rule created</text>

<!-- Activation bar on Router for NAT -->
<rect x="355" y="430" width="10" height="48" rx="2" fill="rgba(6,78,59,0.6)" stroke="#34d399" stroke-width="1"/>

<!-- Phase: NAT in Action -->
<rect x="45" y="510" width="630" height="65" rx="4" fill="none" stroke="#a78bfa" stroke-width="0.8" stroke-dasharray="4,3"/>
<rect x="45" y="510" width="90" height="18" rx="4" fill="rgba(30,41,59,0.8)" stroke="#a78bfa" stroke-width="0.8"/>
<text x="90" y="523" fill="#a78bfa" font-size="8" font-weight="600" text-anchor="middle">NAT Active</text>

<!-- 7: Remote connects -->
<circle cx="572" cy="540" r="9" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1"/>
<text x="572" y="543" fill="#60a5fa" font-size="7" font-weight="600" text-anchor="middle">7</text>
<line x1="585" y1="540" x2="365" y2="540" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
<text x="475" y="532" fill="#e2e8f0" font-size="9" text-anchor="middle">connect :8080</text>

<!-- 8: Forward to PC -->
<circle cx="112" cy="560" r="9" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1"/>
<text x="112" y="563" fill="#60a5fa" font-size="7" font-weight="600" text-anchor="middle">8</text>
<line x1="355" y1="560" x2="135" y2="560" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
<text x="242" y="555" fill="#e2e8f0" font-size="9" text-anchor="middle">forward → .10:80</text>

<!-- Legend -->
<line x1="60" y1="600" x2="100" y2="600" stroke="#22d3ee" stroke-width="1.5"/>
<text x="108" y="603" fill="#94a3b8" font-size="8">request</text>
<line x1="180" y1="600" x2="220" y2="600" stroke="#34d399" stroke-width="1" stroke-dasharray="6,3"/>
<text x="228" y="603" fill="#94a3b8" font-size="8">response</text>
<line x1="310" y1="600" x2="350" y2="600" stroke="#a78bfa" stroke-width="1.5"/>
<text x="358" y="603" fill="#94a3b8" font-size="8">external</text>
<circle cx="430" cy="600" r="7" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="0.8"/>
<text x="430" y="603" fill="#60a5fa" font-size="6" font-weight="600" text-anchor="middle">n</text>
<text x="444" y="603" fill="#94a3b8" font-size="8">step</text>
</svg>
