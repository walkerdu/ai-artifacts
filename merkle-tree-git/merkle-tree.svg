<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', monospace; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background: white + light grid -->
  <rect width="100%" height="100%" fill="#ffffff"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="390" y="35" fill="#1e293b" font-size="16" font-weight="700" text-anchor="middle">Merkle Tree 结构</text>
  <text x="390" y="55" fill="#64748b" font-size="9" text-anchor="middle">自底向上逐层哈希，任意数据修改都会导致根哈希变化</text>

  <!-- Layer labels (left side) -->
  <text x="30" y="115" fill="#94a3b8" font-size="9" font-weight="500">Root</text>
  <text x="30" y="225" fill="#94a3b8" font-size="9" font-weight="500">Branch</text>
  <text x="30" y="335" fill="#94a3b8" font-size="9" font-weight="500">Leaf Hash</text>
  <text x="30" y="445" fill="#94a3b8" font-size="9" font-weight="500">Data</text>

  <!-- ===== ROOT (Level 0) ===== -->
  <rect x="290" y="85" width="200" height="60" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="390" y="108" fill="#1e40af" font-size="12" font-weight="600" text-anchor="middle">Merkle Root</text>
  <text x="390" y="130" fill="#64748b" font-size="9" text-anchor="middle">H( H₁₂ ‖ H₃₄ )</text>

  <!-- ===== BRANCH (Level 1) ===== -->
  <!-- Hash 1-2 -->
  <rect x="140" y="195" width="180" height="60" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="230" y="218" fill="#5B21B6" font-size="11" font-weight="600" text-anchor="middle">Hash 1-2</text>
  <text x="230" y="240" fill="#64748b" font-size="9" text-anchor="middle">H( H₁ ‖ H₂ )</text>

  <!-- Hash 3-4 -->
  <rect x="460" y="195" width="180" height="60" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="550" y="218" fill="#5B21B6" font-size="11" font-weight="600" text-anchor="middle">Hash 3-4</text>
  <text x="550" y="240" fill="#64748b" font-size="9" text-anchor="middle">H( H₃ ‖ H₄ )</text>

  <!-- ===== LEAF HASHES (Level 2) ===== -->
  <!-- H1 -->
  <rect x="80" y="305" width="130" height="60" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="145" y="328" fill="#065F46" font-size="11" font-weight="600" text-anchor="middle">H₁</text>
  <text x="145" y="350" fill="#64748b" font-size="9" text-anchor="middle">Hash(Data₁)</text>

  <!-- H2 -->
  <rect x="245" y="305" width="130" height="60" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="310" y="328" fill="#065F46" font-size="11" font-weight="600" text-anchor="middle">H₂</text>
  <text x="310" y="350" fill="#64748b" font-size="9" text-anchor="middle">Hash(Data₂)</text>

  <!-- H3 -->
  <rect x="410" y="305" width="130" height="60" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="475" y="328" fill="#065F46" font-size="11" font-weight="600" text-anchor="middle">H₃</text>
  <text x="475" y="350" fill="#64748b" font-size="9" text-anchor="middle">Hash(Data₃)</text>

  <!-- H4 -->
  <rect x="575" y="305" width="130" height="60" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="640" y="328" fill="#065F46" font-size="11" font-weight="600" text-anchor="middle">H₄</text>
  <text x="640" y="350" fill="#64748b" font-size="9" text-anchor="middle">Hash(Data₄)</text>

  <!-- ===== DATA BLOCKS (Level 3) ===== -->
  <!-- D1 -->
  <rect x="80" y="415" width="130" height="60" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="145" y="438" fill="#92400E" font-size="11" font-weight="600" text-anchor="middle">Data₁</text>
  <text x="145" y="458" fill="#64748b" font-size="9" text-anchor="middle">Tx: Alice→Bob</text>

  <!-- D2 -->
  <rect x="245" y="415" width="130" height="60" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="310" y="438" fill="#92400E" font-size="11" font-weight="600" text-anchor="middle">Data₂</text>
  <text x="310" y="458" fill="#64748b" font-size="9" text-anchor="middle">Tx: Bob→Carol</text>

  <!-- D3 -->
  <rect x="410" y="415" width="130" height="60" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="475" y="438" fill="#92400E" font-size="11" font-weight="600" text-anchor="middle">Data₃</text>
  <text x="475" y="458" fill="#64748b" font-size="9" text-anchor="middle">Tx: Carol→Dave</text>

  <!-- D4 -->
  <rect x="575" y="415" width="130" height="60" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="640" y="438" fill="#92400E" font-size="11" font-weight="600" text-anchor="middle">Data₄</text>
  <text x="640" y="458" fill="#64748b" font-size="9" text-anchor="middle">Tx: Dave→Eve</text>

  <!-- ===== CONNECTIONS ===== -->
  <!-- Root -> Branch -->
  <line x1="340" y1="145" x2="270" y2="195" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="440" y1="145" x2="510" y2="195" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Branch -> Leaf -->
  <line x1="190" y1="255" x2="160" y2="305" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="270" y1="255" x2="295" y2="305" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="510" y1="255" x2="490" y2="305" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="590" y1="255" x2="620" y2="305" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Leaf -> Data -->
  <line x1="145" y1="365" x2="145" y2="415" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="310" y1="365" x2="310" y2="415" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="475" y1="365" x2="475" y2="415" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="640" y1="365" x2="640" y2="415" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="560" y="70" width="12" height="12" rx="2" fill="#EFF6FF" stroke="#2563EB" stroke-width="1"/>
  <text x="578" y="80" fill="#475569" font-size="8">根哈希</text>
  <rect x="630" y="70" width="12" height="12" rx="2" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1"/>
  <text x="648" y="80" fill="#475569" font-size="8">中间节点</text>
  <rect x="560" y="88" width="12" height="12" rx="2" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="578" y="98" fill="#475569" font-size="8">叶哈希</text>
  <rect x="630" y="88" width="12" height="12" rx="2" fill="#FFFBEB" stroke="#D97706" stroke-width="1"/>
  <text x="648" y="98" fill="#475569" font-size="8">原始数据</text>

  <!-- Annotation -->
  <text x="390" y="500" fill="#64748b" font-size="9" text-anchor="middle">特性: 验证复杂度 O(log n) | 任何叶节点改变 → 根哈希改变 | 支持增量同步</text>
</svg>
