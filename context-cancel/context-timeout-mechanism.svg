<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 620">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
</style>
<defs>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e8ecf0" stroke-width="0.5"/>
  </pattern>
  <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
  </marker>
  <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
  </marker>
  <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
  </marker>
  <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
  </marker>
</defs>

<!-- Background -->
<rect width="100%" height="100%" fill="#fafbfc"/>
<rect width="100%" height="100%" fill="url(#grid)"/>

<!-- Title -->
<text x="430" y="32" fill="#1f2937" font-size="16" font-weight="700" text-anchor="middle">WithTimeout / WithDeadline 实现原理</text>
<text x="430" y="52" fill="#6b7280" font-size="9" text-anchor="middle">本质 = cancelCtx + time.AfterFunc(duration, cancel) — 定时器到期自动关闭 channel</text>

<!-- ===== Step 1: User Call ===== -->
<rect x="250" y="75" width="360" height="56" rx="6" fill="#fafbfc"/>
<rect x="250" y="75" width="360" height="56" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
<text x="430" y="98" fill="#1e40af" font-size="11" font-weight="600" text-anchor="middle">用户调用</text>
<text x="430" y="116" fill="#4b5563" font-size="9" text-anchor="middle">ctx, cancel := context.WithTimeout(parentCtx, 5*time.Second)</text>

<line x1="430" y1="131" x2="430" y2="165" stroke="#6b7280" stroke-width="1" marker-end="url(#arrow)"/>
<text x="440" y="152" fill="#6b7280" font-size="7">创建</text>

<!-- ===== Step 2: timerCtx structure ===== -->
<rect x="30" y="170" width="380" height="130" rx="12" fill="none" stroke="#059669" stroke-width="1" stroke-dasharray="8,4"/>
<text x="42" y="186" fill="#059669" font-size="9" font-weight="600">timerCtx 结构体</text>

<rect x="50" y="198" width="340" height="90" rx="6" fill="#fafbfc"/>
<rect x="50" y="198" width="340" height="90" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
<text x="220" y="220" fill="#065f46" font-size="10" font-weight="600" text-anchor="middle">timerCtx</text>
<line x1="50" y1="228" x2="390" y2="228" stroke="#059669" stroke-width="0.5" stroke-opacity="0.4"/>
<text x="65" y="246" fill="#4b5563" font-size="9">cancelCtx.done = make(chan struct{})</text>
<text x="65" y="262" fill="#059669" font-size="9" font-weight="500">timer = time.AfterFunc(5s, c.cancel)</text>
<text x="65" y="278" fill="#4b5563" font-size="9">deadline = time.Now().Add(5s)</text>

<!-- ===== Timer in Go runtime ===== -->
<rect x="450" y="170" width="380" height="130" rx="12" fill="none" stroke="#d97706" stroke-width="1" stroke-dasharray="8,4"/>
<text x="462" y="186" fill="#d97706" font-size="9" font-weight="600">Go Runtime 时间堆</text>

<rect x="470" y="198" width="340" height="90" rx="6" fill="#fafbfc"/>
<rect x="470" y="198" width="340" height="90" rx="6" fill="#fff7ed" stroke="#d97706" stroke-width="1.5"/>
<text x="640" y="220" fill="#92400e" font-size="10" font-weight="600" text-anchor="middle">time.Timer</text>
<line x1="470" y1="228" x2="810" y2="228" stroke="#d97706" stroke-width="0.5" stroke-opacity="0.4"/>
<text x="485" y="246" fill="#4b5563" font-size="9">注册到 P 本地时间堆 (四叉堆)</text>
<text x="485" y="262" fill="#d97706" font-size="9" font-weight="500">when: 当前时间 + 5s</text>
<text x="485" y="278" fill="#4b5563" font-size="9">f: func() { c.cancel(true, DeadlineExceeded) }</text>

<!-- Arrow connecting timerCtx to timer -->
<line x1="390" y1="243" x2="468" y2="243" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
<text x="415" y="237" fill="#d97706" font-size="7">注册 timer</text>

<!-- ===== Decision: Two paths ===== -->
<text x="430" y="330" fill="#1f2937" font-size="10" font-weight="600" text-anchor="middle">两条触发路径（谁先到谁生效）</text>

<!-- Path A: Timer fires -->
<rect x="470" y="350" width="360" height="110" rx="12" fill="none" stroke="#dc2626" stroke-width="1" stroke-dasharray="8,4"/>
<text x="482" y="366" fill="#dc2626" font-size="9" font-weight="600">路径 A：定时器到期（超时）</text>

<rect x="490" y="378" width="320" height="70" rx="6" fill="#fafbfc"/>
<rect x="490" y="378" width="320" height="70" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
<text x="650" y="400" fill="#991b1b" font-size="10" font-weight="600" text-anchor="middle">5s 到期 → timer 回调触发</text>
<line x1="490" y1="408" x2="810" y2="408" stroke="#dc2626" stroke-width="0.5" stroke-opacity="0.4"/>
<text x="505" y="426" fill="#dc2626" font-size="9">c.cancel(true, DeadlineExceeded)</text>
<text x="505" y="442" fill="#4b5563" font-size="9">→ close(c.done) → 广播给所有子 goroutine</text>

<!-- Path B: Manual cancel -->
<rect x="30" y="350" width="380" height="110" rx="12" fill="none" stroke="#7c3aed" stroke-width="1" stroke-dasharray="8,4"/>
<text x="42" y="366" fill="#7c3aed" font-size="9" font-weight="600">路径 B：手动调用 cancel()（提前取消）</text>

<rect x="50" y="378" width="340" height="70" rx="6" fill="#fafbfc"/>
<rect x="50" y="378" width="340" height="70" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
<text x="220" y="400" fill="#5b21b6" font-size="10" font-weight="600" text-anchor="middle">用户主动 cancel()</text>
<line x1="50" y1="408" x2="390" y2="408" stroke="#7c3aed" stroke-width="0.5" stroke-opacity="0.4"/>
<text x="65" y="426" fill="#7c3aed" font-size="9">c.timer.Stop()  ← 先停定时器</text>
<text x="65" y="442" fill="#4b5563" font-size="9">→ close(c.done) → 同样广播取消信号</text>

<!-- Both paths converge -->
<line x1="220" y1="448" x2="220" y2="490" stroke="#7c3aed" stroke-width="1" marker-end="url(#arrow-violet)"/>
<line x1="650" y1="448" x2="650" y2="490" stroke="#dc2626" stroke-width="1" marker-end="url(#arrow-red)"/>

<!-- Final effect -->
<rect x="130" y="495" width="600" height="70" rx="8" fill="#fafbfc"/>
<rect x="130" y="495" width="600" height="70" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
<text x="430" y="520" fill="#065f46" font-size="11" font-weight="600" text-anchor="middle">最终效果相同</text>
<line x1="130" y1="530" x2="730" y2="530" stroke="#059669" stroke-width="0.5" stroke-opacity="0.4"/>
<text x="430" y="548" fill="#4b5563" font-size="9" text-anchor="middle">close(done) → 所有 &lt;-ctx.Done() 返回 → goroutine 检查 ctx.Err() 得到原因</text>

<!-- Legend / Summary -->
<rect x="130" y="585" width="600" height="28" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="430" y="604" fill="#1f2937" font-size="9" text-anchor="middle">ctx.Err() == context.DeadlineExceeded（超时） 或 context.Canceled（手动取消）</text>
</svg>