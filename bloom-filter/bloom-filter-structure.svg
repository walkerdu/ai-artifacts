<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;family=Noto+Sans+SC:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', monospace; }
</style>
<defs>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
  </pattern>
  <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
  </marker>
  <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
  </marker>
  <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
  </marker>
  <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
  </marker>
</defs>

<!-- Background -->
<rect width="100%" height="100%" fill="#ffffff"/>
<rect width="100%" height="100%" fill="url(#grid)"/>

<!-- Title -->
<text x="40" y="40" fill="#1e293b" font-size="16" font-weight="700">Bloom Filter 结构与操作原理</text>
<text x="40" y="60" fill="#64748b" font-size="9" font-weight="400">bit array + k hash functions → 概率型集合成员判断</text>

<!-- ====== INSERT SECTION ====== -->
<text x="40" y="100" fill="#1e293b" font-size="12" font-weight="600">INSERT 操作</text>

<!-- Element box: "cat" -->
<rect x="60" y="120" width="100" height="50" rx="6" fill="#ffffff"/>
<rect x="60" y="120" width="100" height="50" rx="6" fill="rgba(59,130,246,0.1)" stroke="#3b82f6" stroke-width="1.5"/>
<text x="110" y="142" fill="#1e293b" font-size="11" font-weight="600" text-anchor="middle">"cat"</text>
<text x="110" y="158" fill="#64748b" font-size="9" text-anchor="middle">待插入元素</text>

<!-- Hash functions -->
<rect x="220" y="110" width="130" height="70" rx="6" fill="#ffffff"/>
<rect x="220" y="110" width="130" height="70" rx="6" fill="rgba(16,185,129,0.1)" stroke="#10b981" stroke-width="1.5"/>
<text x="285" y="132" fill="#1e293b" font-size="11" font-weight="600" text-anchor="middle">k 个哈希函数</text>
<text x="285" y="150" fill="#10b981" font-size="9" text-anchor="middle">h1("cat") → 2</text>
<text x="285" y="164" fill="#10b981" font-size="9" text-anchor="middle">h2("cat") → 5</text>
<text x="285" y="178" fill="#10b981" font-size="9" text-anchor="middle">h3("cat") → 11</text>

<!-- Arrow from element to hash -->
<line x1="160" y1="145" x2="218" y2="145" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

<!-- Bit Array -->
<text x="420" y="108" fill="#1e293b" font-size="11" font-weight="600">bit 数组 (m = 16)</text>

<!-- Bit array cells -->
<g transform="translate(420, 120)">
  <!-- bit 0 -->
  <rect x="0" y="0" width="28" height="28" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="14" y="15" fill="#94a3b8" font-size="10" font-weight="500" text-anchor="middle" dominant-baseline="central">0</text>
  <text x="14" y="42" fill="#94a3b8" font-size="7" text-anchor="middle">0</text>
  <!-- bit 1 -->
  <rect x="32" y="0" width="28" height="28" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="46" y="15" fill="#94a3b8" font-size="10" font-weight="500" text-anchor="middle" dominant-baseline="central">0</text>
  <text x="46" y="42" fill="#94a3b8" font-size="7" text-anchor="middle">1</text>
  <!-- bit 2 - set by cat -->
  <rect x="64" y="0" width="28" height="28" rx="4" fill="rgba(59,130,246,0.15)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="78" y="15" fill="#3b82f6" font-size="10" font-weight="700" text-anchor="middle" dominant-baseline="central">1</text>
  <text x="78" y="42" fill="#3b82f6" font-size="7" font-weight="600" text-anchor="middle">2</text>
  <!-- bit 3 -->
  <rect x="96" y="0" width="28" height="28" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="110" y="15" fill="#94a3b8" font-size="10" font-weight="500" text-anchor="middle" dominant-baseline="central">0</text>
  <text x="110" y="42" fill="#94a3b8" font-size="7" text-anchor="middle">3</text>
  <!-- bit 4 - set by dog -->
  <rect x="128" y="0" width="28" height="28" rx="4" fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="142" y="15" fill="#f59e0b" font-size="10" font-weight="700" text-anchor="middle" dominant-baseline="central">1</text>
  <text x="142" y="42" fill="#f59e0b" font-size="7" font-weight="600" text-anchor="middle">4</text>
  <!-- bit 5 - set by cat -->
  <rect x="160" y="0" width="28" height="28" rx="4" fill="rgba(59,130,246,0.15)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="174" y="15" fill="#3b82f6" font-size="10" font-weight="700" text-anchor="middle" dominant-baseline="central">1</text>
  <text x="174" y="42" fill="#3b82f6" font-size="7" font-weight="600" text-anchor="middle">5</text>
  <!-- bit 6 - set by dog -->
  <rect x="192" y="0" width="28" height="28" rx="4" fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="206" y="15" fill="#f59e0b" font-size="10" font-weight="700" text-anchor="middle" dominant-baseline="central">1</text>
  <text x="206" y="42" fill="#f59e0b" font-size="7" font-weight="600" text-anchor="middle">6</text>
  <!-- bit 7 -->
  <rect x="224" y="0" width="28" height="28" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="238" y="15" fill="#94a3b8" font-size="10" font-weight="500" text-anchor="middle" dominant-baseline="central">0</text>
  <text x="238" y="42" fill="#94a3b8" font-size="7" text-anchor="middle">7</text>
  <!-- bit 8 -->
  <rect x="256" y="0" width="28" height="28" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="270" y="15" fill="#94a3b8" font-size="10" font-weight="500" text-anchor="middle" dominant-baseline="central">0</text>
  <text x="270" y="42" fill="#94a3b8" font-size="7" text-anchor="middle">8</text>
  <!-- bit 9 - set by dog -->
  <rect x="288" y="0" width="28" height="28" rx="4" fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="302" y="15" fill="#f59e0b" font-size="10" font-weight="700" text-anchor="middle" dominant-baseline="central">1</text>
  <text x="302" y="42" fill="#f59e0b" font-size="7" font-weight="600" text-anchor="middle">9</text>
  <!-- bit 10 -->
  <rect x="320" y="0" width="28" height="28" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="334" y="15" fill="#94a3b8" font-size="10" font-weight="500" text-anchor="middle" dominant-baseline="central">0</text>
  <text x="334" y="42" fill="#94a3b8" font-size="7" text-anchor="middle">10</text>
  <!-- bit 11 - set by cat -->
  <rect x="352" y="0" width="28" height="28" rx="4" fill="rgba(59,130,246,0.15)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="366" y="15" fill="#3b82f6" font-size="10" font-weight="700" text-anchor="middle" dominant-baseline="central">1</text>
  <text x="366" y="42" fill="#3b82f6" font-size="7" font-weight="600" text-anchor="middle">11</text>
  <!-- bit 12 -->
  <rect x="384" y="0" width="28" height="28" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="398" y="15" fill="#94a3b8" font-size="10" font-weight="500" text-anchor="middle" dominant-baseline="central">0</text>
  <text x="398" y="42" fill="#94a3b8" font-size="7" text-anchor="middle">12</text>
  <!-- bit 13 -->
  <rect x="416" y="0" width="28" height="28" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="430" y="15" fill="#94a3b8" font-size="10" font-weight="500" text-anchor="middle" dominant-baseline="central">0</text>
  <text x="430" y="42" fill="#94a3b8" font-size="7" text-anchor="middle">13</text>
  <!-- bit 14 -->
  <rect x="448" y="0" width="28" height="28" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="462" y="15" fill="#94a3b8" font-size="10" font-weight="500" text-anchor="middle" dominant-baseline="central">0</text>
  <text x="462" y="42" fill="#94a3b8" font-size="7" text-anchor="middle">14</text>
  <!-- bit 15 -->
  <rect x="480" y="0" width="28" height="28" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="494" y="15" fill="#94a3b8" font-size="10" font-weight="500" text-anchor="middle" dominant-baseline="central">0</text>
  <text x="494" y="42" fill="#94a3b8" font-size="7" text-anchor="middle">15</text>
</g>

<!-- Arrows from hash to specific bits -->
<path d="M350 145 C380 145, 400 134, 482 134" stroke="#3b82f6" stroke-width="1.2" fill="none" marker-end="url(#arrow-blue)" stroke-dasharray="4,2"/>
<path d="M350 150 C380 150, 420 134, 578 134" stroke="#3b82f6" stroke-width="1.2" fill="none" marker-end="url(#arrow-blue)" stroke-dasharray="4,2"/>
<path d="M350 155 C380 155, 520 134, 770 134" stroke="#3b82f6" stroke-width="1.2" fill="none" marker-end="url(#arrow-blue)" stroke-dasharray="4,2"/>

<!-- Legend for bit array -->
<rect x="420" y="175" width="10" height="10" rx="2" fill="rgba(59,130,246,0.15)" stroke="#3b82f6" stroke-width="1"/>
<text x="435" y="184" fill="#3b82f6" font-size="9">"cat" 置位 (位 2, 5, 11)</text>
<rect x="580" y="175" width="10" height="10" rx="2" fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="1"/>
<text x="595" y="184" fill="#f59e0b" font-size="9">"dog" 置位 (位 4, 6, 9)</text>

<!-- ====== QUERY SECTION ====== -->
<rect x="40" y="210" width="820" height="1" fill="#e2e8f0"/>
<text x="40" y="240" fill="#1e293b" font-size="12" font-weight="600">QUERY 操作</text>

<!-- Query "cat" - definitely might exist -->
<rect x="60" y="260" width="380" height="150" rx="8" fill="#ffffff"/>
<rect x="60" y="260" width="380" height="150" rx="8" fill="rgba(16,185,129,0.05)" stroke="#10b981" stroke-width="1" stroke-dasharray="6,3"/>
<text x="80" y="282" fill="#10b981" font-size="10" font-weight="600">查询 "cat" → 可能存在 ✓</text>
<text x="80" y="302" fill="#64748b" font-size="9">h1("cat")=2 → bit[2]=1 ✓</text>
<text x="80" y="318" fill="#64748b" font-size="9">h2("cat")=5 → bit[5]=1 ✓</text>
<text x="80" y="334" fill="#64748b" font-size="9">h3("cat")=11 → bit[11]=1 ✓</text>
<text x="80" y="358" fill="#10b981" font-size="9" font-weight="500">所有位均为 1 → 报告"可能存在"</text>
<text x="80" y="376" fill="#10b981" font-size="9" font-weight="500">（本例中确实存在，判断正确）</text>
<text x="80" y="396" fill="#64748b" font-size="8">结论: 实际存在 → True Positive</text>

<!-- Query "fox" - definitely not exist -->
<rect x="480" y="260" width="380" height="150" rx="8" fill="#ffffff"/>
<rect x="480" y="260" width="380" height="150" rx="8" fill="rgba(239,68,68,0.05)" stroke="#ef4444" stroke-width="1" stroke-dasharray="6,3"/>
<text x="500" y="282" fill="#ef4444" font-size="10" font-weight="600">查询 "fox" → 一定不存在 ✗</text>
<text x="500" y="302" fill="#64748b" font-size="9">h1("fox")=1 → bit[1]=0 ✗</text>
<text x="500" y="318" fill="#64748b" font-size="9">h2("fox")=7 → bit[7]=0 ✗</text>
<text x="500" y="334" fill="#64748b" font-size="9">h3("fox")=10 → bit[10]=0 ✗</text>
<text x="500" y="358" fill="#ef4444" font-size="9" font-weight="500">存在 0 位 → 一定不在集合中</text>
<text x="500" y="376" fill="#ef4444" font-size="9" font-weight="500">（zero false negative 保证）</text>
<text x="500" y="396" fill="#64748b" font-size="8">结论: 不存在 → True Negative</text>

<!-- FALSE POSITIVE SECTION -->
<rect x="40" y="430" width="820" height="1" fill="#e2e8f0"/>
<text x="40" y="460" fill="#1e293b" font-size="12" font-weight="600">False Positive 场景</text>

<rect x="60" y="475" width="800" height="120" rx="8" fill="#ffffff"/>
<rect x="60" y="475" width="800" height="120" rx="8" fill="rgba(245,158,11,0.05)" stroke="#f59e0b" stroke-width="1" stroke-dasharray="6,3"/>
<text x="80" y="497" fill="#f59e0b" font-size="10" font-weight="600">查询 "fish" → 误判为存在 (False Positive)</text>
<text x="80" y="520" fill="#64748b" font-size="9">h1("fish")=5 → bit[5]=1 ✓  (由 "cat" 置位)</text>
<text x="80" y="536" fill="#64748b" font-size="9">h2("fish")=9 → bit[9]=1 ✓  (由 "dog" 置位)</text>
<text x="80" y="552" fill="#64748b" font-size="9">h3("fish")=11 → bit[11]=1 ✓  (由 "cat" 置位)</text>
<text x="80" y="576" fill="#f59e0b" font-size="9" font-weight="500">所有位均为 1，但 "fish" 从未插入 → 哈希碰撞导致误判</text>

<!-- Key insight box -->
<rect x="530" y="510" width="310" height="70" rx="6" fill="#ffffff"/>
<rect x="530" y="510" width="310" height="70" rx="6" fill="rgba(139,92,246,0.08)" stroke="#8b5cf6" stroke-width="1.5"/>
<text x="550" y="532" fill="#8b5cf6" font-size="10" font-weight="600">核心性质</text>
<text x="550" y="550" fill="#1e293b" font-size="9">• 返回"不存在" → 100% 准确</text>
<text x="550" y="566" fill="#1e293b" font-size="9">• 返回"存在" → 有一定概率是误判</text>

</svg>