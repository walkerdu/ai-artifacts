<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1250">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', monospace; }
  </style>
  
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0891b2"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="550" y="35" fill="#0f172a" font-size="18" font-weight="700" text-anchor="middle">ICE (Interactive Connectivity Establishment) 完整流程</text>
  <text x="550" y="55" fill="#64748b" font-size="10" text-anchor="middle">RFC 8445 — 自动选择最优连接路径：直连 → STUN 打洞 → TURN 中继</text>

  <!-- ============ PHASE 1: Candidate Gathering ============ -->
  <rect x="30" y="75" width="1040" height="280" rx="10" fill="rgba(8,145,178,0.03)" stroke="#0891b2" stroke-width="1.5" stroke-dasharray="8,4"/>
  <rect x="30" y="75" width="240" height="24" rx="10" fill="#0891b2"/>
  <text x="150" y="91" fill="white" font-size="10" font-weight="600" text-anchor="middle">Phase 1: 收集候选地址 (Gathering)</text>

  <!-- Host Candidate -->
  <rect x="80" y="120" width="280" height="80" rx="8" fill="white" stroke="#16a34a" stroke-width="2"/>
  <text x="220" y="145" fill="#16a34a" font-size="12" font-weight="700" text-anchor="middle">Host Candidate</text>
  <text x="220" y="163" fill="#0f172a" font-size="9" text-anchor="middle">本机网卡绑定的地址</text>
  <text x="220" y="180" fill="#64748b" font-size="9" text-anchor="middle">例: 192.168.1.100:8000</text>
  <rect x="90" y="190" width="260" height="4" rx="2" fill="#16a34a" opacity="0.3"/>
  <text x="220" y="198" fill="#64748b" font-size="7" text-anchor="middle">优先级最高 | 同局域网时直连</text>

  <!-- Server Reflexive Candidate -->
  <rect x="410" y="120" width="280" height="80" rx="8" fill="white" stroke="#2563eb" stroke-width="2"/>
  <text x="550" y="145" fill="#2563eb" font-size="12" font-weight="700" text-anchor="middle">Server Reflexive Candidate</text>
  <text x="550" y="163" fill="#0f172a" font-size="9" text-anchor="middle">STUN 探测到的公网地址</text>
  <text x="550" y="180" fill="#64748b" font-size="9" text-anchor="middle">例: 27.38.2.196:11812</text>
  <rect x="420" y="190" width="260" height="4" rx="2" fill="#2563eb" opacity="0.3"/>
  <text x="550" y="198" fill="#64748b" font-size="7" text-anchor="middle">优先级中等 | P2P 打洞用</text>

  <!-- Relay Candidate -->
  <rect x="740" y="120" width="280" height="80" rx="8" fill="white" stroke="#d97706" stroke-width="2"/>
  <text x="880" y="145" fill="#d97706" font-size="12" font-weight="700" text-anchor="middle">Relay Candidate</text>
  <text x="880" y="163" fill="#0f172a" font-size="9" text-anchor="middle">TURN 服务器分配的中继地址</text>
  <text x="880" y="180" fill="#64748b" font-size="9" text-anchor="middle">例: turn.example.com:49000</text>
  <rect x="750" y="190" width="260" height="4" rx="2" fill="#d97706" opacity="0.3"/>
  <text x="880" y="198" fill="#64748b" font-size="7" text-anchor="middle">优先级最低 | 保底方案，一定通</text>

  <!-- Gathering arrows -->
  <line x1="220" y1="210" x2="220" y2="240" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="220" y="256" fill="#16a34a" font-size="8" font-weight="500" text-anchor="middle">直接读取本地网卡</text>

  <line x1="550" y1="210" x2="550" y2="240" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="550" y="256" fill="#2563eb" font-size="8" font-weight="500" text-anchor="middle">向 STUN 服务器发 Binding Request</text>

  <line x1="880" y1="210" x2="880" y2="240" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <text x="880" y="256" fill="#d97706" font-size="8" font-weight="500" text-anchor="middle">向 TURN 服务器发 Allocate Request</text>

  <!-- Gathering result box -->
  <rect x="200" y="275" width="700" height="55" rx="8" fill="rgba(8,145,178,0.06)" stroke="#0891b2" stroke-width="1.5"/>
  <text x="550" y="298" fill="#0f172a" font-size="10" font-weight="600" text-anchor="middle">候选地址列表 (Candidate List)</text>
  <text x="550" y="316" fill="#64748b" font-size="9" text-anchor="middle">host: 192.168.1.100:8000 | srflx: 27.38.2.196:11812 | relay: turn.example.com:49000</text>

  <!-- Arrow down to Phase 2 -->
  <line x1="550" y1="330" x2="550" y2="380" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============ PHASE 2: Exchange via Signaling ============ -->
  <rect x="30" y="380" width="1040" height="130" rx="10" fill="rgba(124,58,237,0.03)" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="8,4"/>
  <rect x="30" y="380" width="280" height="24" rx="10" fill="#7c3aed"/>
  <text x="170" y="396" fill="white" font-size="10" font-weight="600" text-anchor="middle">Phase 2: 通过信令交换候选地址 (SDP Offer/Answer)</text>

  <!-- Peer A -->
  <rect x="100" y="420" width="180" height="50" rx="8" fill="white" stroke="#0891b2" stroke-width="2"/>
  <text x="190" y="442" fill="#0891b2" font-size="11" font-weight="600" text-anchor="middle">Peer A</text>
  <text x="190" y="458" fill="#64748b" font-size="8" text-anchor="middle">3 个候选地址</text>

  <!-- Signaling -->
  <rect x="430" y="420" width="240" height="50" rx="8" fill="white" stroke="#7c3aed" stroke-width="2"/>
  <text x="550" y="442" fill="#7c3aed" font-size="11" font-weight="600" text-anchor="middle">信令服务器</text>
  <text x="550" y="458" fill="#64748b" font-size="8" text-anchor="middle">WebSocket / HTTP / SIP</text>

  <!-- Peer B -->
  <rect x="820" y="420" width="180" height="50" rx="8" fill="white" stroke="#0891b2" stroke-width="2"/>
  <text x="910" y="442" fill="#0891b2" font-size="11" font-weight="600" text-anchor="middle">Peer B</text>
  <text x="910" y="458" fill="#64748b" font-size="8" text-anchor="middle">3 个候选地址</text>

  <!-- Exchange arrows -->
  <line x1="280" y1="440" x2="420" y2="440" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="350" y="433" fill="#7c3aed" font-size="8" text-anchor="middle">SDP Offer</text>
  <line x1="670" y1="450" x2="810" y2="450" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="740" y="443" fill="#7c3aed" font-size="8" text-anchor="middle">转发 → B</text>
  <line x1="810" y1="460" x2="670" y2="460" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-purple)"/>
  <text x="740" y="477" fill="#7c3aed" font-size="8" text-anchor="middle">SDP Answer</text>
  <line x1="420" y1="470" x2="280" y2="470" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-purple)"/>
  <text x="350" y="487" fill="#7c3aed" font-size="8" text-anchor="middle">转发 → A</text>

  <!-- Note -->
  <text x="550" y="502" fill="#64748b" font-size="8" text-anchor="middle">双方交换后，各自拥有对方的全部候选地址 → 组成候选对 (Candidate Pairs)</text>

  <!-- Arrow down to Phase 3 -->
  <line x1="550" y1="510" x2="550" y2="545" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============ PHASE 3: Connectivity Checks ============ -->
  <rect x="30" y="545" width="1040" height="480" rx="10" fill="rgba(22,163,106,0.03)" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="8,4"/>
  <rect x="30" y="545" width="320" height="24" rx="10" fill="#16a34a"/>
  <text x="190" y="561" fill="white" font-size="10" font-weight="600" text-anchor="middle">Phase 3: 连通性检测 (Connectivity Checks)</text>

  <!-- Candidate Pairs -->
  <rect x="300" y="580" width="500" height="60" rx="8" fill="white" stroke="#0f172a" stroke-width="1.5"/>
  <text x="550" y="600" fill="#0f172a" font-size="10" font-weight="600" text-anchor="middle">生成候选对 (按优先级排序)</text>
  <text x="550" y="618" fill="#64748b" font-size="8" text-anchor="middle">A.host↔B.host | A.srflx↔B.srflx | A.host↔B.srflx | ... | A.relay↔B.relay</text>
  <text x="550" y="632" fill="#16a34a" font-size="8" font-weight="500" text-anchor="middle">← 优先级高                                                                    优先级低 →</text>

  <!-- Arrow to first check -->
  <line x1="550" y1="640" x2="550" y2="670" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Check 1: Host-Host -->
  <rect x="370" y="670" width="360" height="50" rx="8" fill="white" stroke="#16a34a" stroke-width="2"/>
  <text x="550" y="692" fill="#16a34a" font-size="10" font-weight="600" text-anchor="middle">尝试 1: Host ↔ Host (直连)</text>
  <text x="550" y="710" fill="#64748b" font-size="8" text-anchor="middle">双方互发 STUN Binding Request 到对方内网地址</text>

  <!-- Decision 1 -->
  <line x1="550" y1="720" x2="550" y2="755" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <g transform="translate(550, 780)">
    <polygon points="0,-25 60,0 0,25 -60,0" fill="white" stroke="#d97706" stroke-width="2"/>
    <text y="4" fill="#d97706" font-size="9" font-weight="600" text-anchor="middle">收到回复?</text>
  </g>

  <!-- Yes path 1 -->
  <line x1="610" y1="780" x2="750" y2="780" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="660" y="772" fill="#16a34a" font-size="8" font-weight="600">是 ✓</text>
  <rect x="760" y="762" width="240" height="36" rx="6" fill="rgba(22,163,106,0.1)" stroke="#16a34a" stroke-width="1.5"/>
  <text x="880" y="778" fill="#16a34a" font-size="9" font-weight="600" text-anchor="middle">选用! 同局域网直连</text>
  <text x="880" y="792" fill="#64748b" font-size="8" text-anchor="middle">延迟 &lt;1ms, 零成本</text>

  <!-- No path 1 → Check 2 -->
  <line x1="550" y1="805" x2="550" y2="840" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="565" y="825" fill="#dc2626" font-size="8" font-weight="600">否</text>

  <!-- Check 2: Server Reflexive -->
  <rect x="370" y="840" width="360" height="50" rx="8" fill="white" stroke="#2563eb" stroke-width="2"/>
  <text x="550" y="862" fill="#2563eb" font-size="10" font-weight="600" text-anchor="middle">尝试 2: Server Reflexive ↔ Server Reflexive</text>
  <text x="550" y="880" fill="#64748b" font-size="8" text-anchor="middle">双方向对方 STUN 探测到的公网地址互发 (打洞)</text>

  <!-- Decision 2 -->
  <line x1="550" y1="890" x2="550" y2="920" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <g transform="translate(550, 945)">
    <polygon points="0,-25 60,0 0,25 -60,0" fill="white" stroke="#d97706" stroke-width="2"/>
    <text y="4" fill="#d97706" font-size="9" font-weight="600" text-anchor="middle">收到回复?</text>
  </g>

  <!-- Yes path 2 -->
  <line x1="610" y1="945" x2="750" y2="945" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="660" y="937" fill="#16a34a" font-size="8" font-weight="600">是 ✓</text>
  <rect x="760" y="927" width="240" height="36" rx="6" fill="rgba(37,99,235,0.1)" stroke="#2563eb" stroke-width="1.5"/>
  <text x="880" y="943" fill="#2563eb" font-size="9" font-weight="600" text-anchor="middle">选用! P2P 直连 (打洞成功)</text>
  <text x="880" y="957" fill="#64748b" font-size="8" text-anchor="middle">延迟低, 零转发成本</text>

  <!-- No path 2 → Check 3 -->
  <line x1="550" y1="970" x2="550" y2="1000" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="565" y="988" fill="#dc2626" font-size="8" font-weight="600">否 (Symmetric NAT)</text>

  <!-- Check 3: Relay -->
  <rect x="370" y="1000" width="360" height="50" rx="8" fill="white" stroke="#d97706" stroke-width="2"/>
  <text x="550" y="1022" fill="#d97706" font-size="10" font-weight="600" text-anchor="middle">尝试 3: Relay ↔ Relay (TURN 中继)</text>
  <text x="550" y="1040" fill="#64748b" font-size="8" text-anchor="middle">数据经 TURN 服务器转发，一定能通</text>

  <!-- Always succeeds -->
  <line x1="550" y1="1050" x2="550" y2="1075" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="420" y="1075" width="260" height="36" rx="6" fill="rgba(217,119,6,0.1)" stroke="#d97706" stroke-width="1.5"/>
  <text x="550" y="1091" fill="#d97706" font-size="9" font-weight="600" text-anchor="middle">保底方案! TURN 中继</text>
  <text x="550" y="1105" fill="#64748b" font-size="8" text-anchor="middle">延迟较高, 消耗服务器带宽</text>

  <!-- Note: actual ICE checks all pairs in parallel -->
  <rect x="60" y="680" width="260" height="70" rx="6" fill="rgba(100,116,139,0.06)" stroke="#94a3b8" stroke-width="1"/>
  <text x="190" y="700" fill="#64748b" font-size="8" font-weight="600" text-anchor="middle">实际 ICE 行为:</text>
  <text x="190" y="715" fill="#64748b" font-size="8" text-anchor="middle">所有候选对并行检测</text>
  <text x="190" y="730" fill="#64748b" font-size="8" text-anchor="middle">此图简化为顺序展示</text>
  <text x="190" y="745" fill="#64748b" font-size="8" text-anchor="middle">优先级高的先「提名」</text>

  <!-- ============ PHASE 4: Selection ============ -->
  <rect x="30" y="1135" width="1040" height="90" rx="10" fill="rgba(37,99,235,0.03)" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="8,4"/>
  <rect x="30" y="1135" width="260" height="24" rx="10" fill="#2563eb"/>
  <text x="160" y="1151" fill="white" font-size="10" font-weight="600" text-anchor="middle">Phase 4: 选择并使用最优路径</text>

  <!-- Arrow down -->
  <line x1="550" y1="1111" x2="550" y2="1145" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Result -->
  <rect x="150" y="1160" width="800" height="50" rx="8" fill="white" stroke="#2563eb" stroke-width="2"/>
  <text x="550" y="1182" fill="#0f172a" font-size="10" font-weight="600" text-anchor="middle">选中优先级最高的已验证候选对 → 开始传输音视频/游戏数据</text>
  <text x="550" y="1200" fill="#64748b" font-size="9" text-anchor="middle">如果当前路径中断 (NAT 超时等)，自动切换到备选候选对 (ICE Restart)</text>

  <!-- Legend -->
  <rect x="30" y="1230" width="1040" height="3" rx="1" fill="#e2e8f0"/>
  
</svg>
