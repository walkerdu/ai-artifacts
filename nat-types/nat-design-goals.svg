<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
</style>
<defs>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
  </pattern>
  <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
  </marker>
  <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#0891b2"/>
  </marker>
  <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
  </marker>
  <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
  </marker>
  <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#f8fafc"/>
<rect width="100%" height="100%" fill="url(#grid)"/>

<!-- Title Block -->
<text x="450" y="40" fill="#0f172a" font-size="16" font-weight="700" text-anchor="middle">NAT 的设计动机与目标</text>
<text x="450" y="60" fill="#64748b" font-size="9" text-anchor="middle">RFC 1631 (1994) — 为什么需要网络地址翻译?</text>

<!-- ============================================= -->
<!-- Problem Section -->
<!-- ============================================= -->
<rect x="30" y="80" width="840" height="90" rx="12" fill="none" stroke="#dc2626" stroke-width="1" stroke-dasharray="8,4"/>
<text x="50" y="100" fill="#dc2626" font-size="9" font-weight="600">核心矛盾</text>

<rect x="50" y="110" width="260" height="50" rx="6" fill="white"/>
<rect x="50" y="110" width="260" height="50" rx="6" fill="rgba(220,38,38,0.06)" stroke="#dc2626" stroke-width="1.5"/>
<text x="180" y="133" fill="#0f172a" font-size="11" font-weight="600" text-anchor="middle">IPv4 地址总量</text>
<text x="180" y="150" fill="#dc2626" font-size="9" text-anchor="middle">2^32 = 43 亿 (1981年设计)</text>

<rect x="380" y="110" width="100" height="50" rx="6" fill="white"/>
<rect x="380" y="110" width="100" height="50" rx="6" fill="rgba(220,38,38,0.06)" stroke="#dc2626" stroke-width="1.5"/>
<text x="430" y="140" fill="#dc2626" font-size="16" font-weight="700" text-anchor="middle">&lt;&lt;</text>

<rect x="550" y="110" width="260" height="50" rx="6" fill="white"/>
<rect x="550" y="110" width="260" height="50" rx="6" fill="rgba(220,38,38,0.06)" stroke="#dc2626" stroke-width="1.5"/>
<text x="680" y="133" fill="#0f172a" font-size="11" font-weight="600" text-anchor="middle">全球联网设备需求</text>
<text x="680" y="150" fill="#dc2626" font-size="9" text-anchor="middle">200+ 亿设备 (持续增长)</text>

<!-- Arrow from problem to NAT -->
<path d="M450,170 L450,200" fill="none" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ============================================= -->
<!-- NAT Solution (center node) -->
<!-- ============================================= -->
<rect x="310" y="200" width="280" height="55" rx="27" fill="white"/>
<rect x="310" y="200" width="280" height="55" rx="27" fill="rgba(8,145,178,0.1)" stroke="#0891b2" stroke-width="2"/>
<text x="450" y="224" fill="#0f172a" font-size="13" font-weight="700" text-anchor="middle">NAT — 网络地址翻译</text>
<text x="450" y="244" fill="#0891b2" font-size="9" text-anchor="middle">1994 年提出的过渡方案 (RFC 1631)</text>

<!-- Branching lines to 3 goals -->
<path d="M350,255 L180,300" fill="none" stroke="#059669" stroke-width="1"/>
<path d="M450,255 L450,300" fill="none" stroke="#7c3aed" stroke-width="1"/>
<path d="M550,255 L720,300" fill="none" stroke="#d97706" stroke-width="1"/>

<!-- ============================================= -->
<!-- Goal 1: Address Multiplexing -->
<!-- ============================================= -->
<rect x="50" y="300" width="260" height="140" rx="8" fill="white"/>
<rect x="50" y="300" width="260" height="140" rx="8" fill="rgba(5,150,105,0.06)" stroke="#059669" stroke-width="1.5"/>
<text x="180" y="325" fill="#059669" font-size="12" font-weight="700" text-anchor="middle">设计目标 1</text>
<text x="180" y="345" fill="#0f172a" font-size="11" font-weight="600" text-anchor="middle">地址复用 (Address Sharing)</text>
<line x1="70" y1="355" x2="290" y2="355" stroke="#e2e8f0" stroke-width="0.5"/>
<text x="70" y="375" fill="#475569" font-size="9">多台内网设备共享 1 个公网 IP</text>
<text x="70" y="393" fill="#475569" font-size="9">通过 端口号 区分不同连接</text>
<text x="70" y="411" fill="#475569" font-size="9">1 个家庭/企业 = 1 个公网地址</text>
<text x="70" y="429" fill="#059669" font-size="8">效果: 地址利用率提升 1000x+</text>

<!-- ============================================= -->
<!-- Goal 2: Transparent -->
<!-- ============================================= -->
<rect x="320" y="300" width="260" height="140" rx="8" fill="white"/>
<rect x="320" y="300" width="260" height="140" rx="8" fill="rgba(124,58,237,0.06)" stroke="#7c3aed" stroke-width="1.5"/>
<text x="450" y="325" fill="#7c3aed" font-size="12" font-weight="700" text-anchor="middle">设计目标 2</text>
<text x="450" y="345" fill="#0f172a" font-size="11" font-weight="600" text-anchor="middle">对终端透明 (Transparent)</text>
<line x1="340" y1="355" x2="560" y2="355" stroke="#e2e8f0" stroke-width="0.5"/>
<text x="340" y="375" fill="#475569" font-size="9">内网设备零改动即可上网</text>
<text x="340" y="393" fill="#475569" font-size="9">外网服务器无需感知 NAT 存在</text>
<text x="340" y="411" fill="#475569" font-size="9">仅需边界路由器部署一台设备</text>
<text x="340" y="429" fill="#7c3aed" font-size="8">定位: IPv6 普及前的过渡方案</text>

<!-- ============================================= -->
<!-- Goal 3: Security side-effect -->
<!-- ============================================= -->
<rect x="590" y="300" width="260" height="140" rx="8" fill="white"/>
<rect x="590" y="300" width="260" height="140" rx="8" fill="rgba(217,119,6,0.06)" stroke="#d97706" stroke-width="1.5"/>
<text x="720" y="325" fill="#d97706" font-size="12" font-weight="700" text-anchor="middle">附带效果</text>
<text x="720" y="345" fill="#0f172a" font-size="11" font-weight="600" text-anchor="middle">天然安全屏障 (Side-effect)</text>
<line x1="610" y1="355" x2="830" y2="355" stroke="#e2e8f0" stroke-width="0.5"/>
<text x="610" y="375" fill="#475569" font-size="9">外网无法直接定位内网设备</text>
<text x="610" y="393" fill="#475569" font-size="9">端口扫描对 NAT 后面设备无效</text>
<text x="610" y="411" fill="#475569" font-size="9">未建立映射 = 外网无法入站</text>
<text x="610" y="429" fill="#d97706" font-size="8">注: 非设计目标，是地址翻译的副产品</text>

<!-- ============================================= -->
<!-- How it works -->
<!-- ============================================= -->
<path d="M450,440 L450,470" fill="none" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>
<text x="470" y="460" fill="#64748b" font-size="8">实现原理</text>

<rect x="100" y="470" width="700" height="70" rx="8" fill="white"/>
<rect x="100" y="470" width="700" height="70" rx="8" fill="rgba(8,145,178,0.04)" stroke="#0891b2" stroke-width="1"/>
<text x="450" y="495" fill="#0f172a" font-size="11" font-weight="600" text-anchor="middle">地址翻译: 改写 IP 包头的源/目的地址</text>
<text x="450" y="515" fill="#475569" font-size="9" text-anchor="middle">出站: 内网私有地址 (192.168.x.x) → 公网地址 (1.2.3.4) | 入站: 公网地址 → 内网地址</text>
<text x="450" y="532" fill="#0891b2" font-size="8" text-anchor="middle">本质: 一个"地址翻译官"坐在内外网边界，利用端口号多路复用，让 N 台设备共用 1 个公网 IP</text>

<!-- ============================================= -->
<!-- Cost / Trade-offs -->
<!-- ============================================= -->
<path d="M450,540 L450,565" fill="none" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>
<text x="470" y="557" fill="#64748b" font-size="8">代价</text>

<rect x="30" y="565" width="840" height="90" rx="12" fill="none" stroke="#dc2626" stroke-width="0.5" stroke-dasharray="4,4"/>
<text x="50" y="583" fill="#dc2626" font-size="9" font-weight="600">打破了 IP 端到端原则</text>

<rect x="50" y="592" width="155" height="50" rx="6" fill="white"/>
<rect x="50" y="592" width="155" height="50" rx="6" fill="rgba(220,38,38,0.04)" stroke="#dc2626" stroke-width="1"/>
<text x="127" y="612" fill="#0f172a" font-size="9" font-weight="600" text-anchor="middle">P2P 通信困难</text>
<text x="127" y="630" fill="#64748b" font-size="8" text-anchor="middle">需要STUN/TURN打洞</text>

<rect x="220" y="592" width="155" height="50" rx="6" fill="white"/>
<rect x="220" y="592" width="155" height="50" rx="6" fill="rgba(220,38,38,0.04)" stroke="#dc2626" stroke-width="1"/>
<text x="297" y="612" fill="#0f172a" font-size="9" font-weight="600" text-anchor="middle">某些协议失效</text>
<text x="297" y="630" fill="#64748b" font-size="8" text-anchor="middle">FTP/SIP 需要 ALG</text>

<rect x="390" y="592" width="155" height="50" rx="6" fill="white"/>
<rect x="390" y="592" width="155" height="50" rx="6" fill="rgba(220,38,38,0.04)" stroke="#dc2626" stroke-width="1"/>
<text x="467" y="612" fill="#0f172a" font-size="9" font-weight="600" text-anchor="middle">端口资源有限</text>
<text x="467" y="630" fill="#64748b" font-size="8" text-anchor="middle">65535 上限/CGNAT瓶颈</text>

<rect x="560" y="592" width="155" height="50" rx="6" fill="white"/>
<rect x="560" y="592" width="155" height="50" rx="6" fill="rgba(220,38,38,0.04)" stroke="#dc2626" stroke-width="1"/>
<text x="637" y="612" fill="#0f172a" font-size="9" font-weight="600" text-anchor="middle">溯源困难</text>
<text x="637" y="630" fill="#64748b" font-size="8" text-anchor="middle">多用户共享IP难追查</text>

<rect x="730" y="592" width="120" height="50" rx="6" fill="white"/>
<rect x="730" y="592" width="120" height="50" rx="6" fill="rgba(220,38,38,0.04)" stroke="#dc2626" stroke-width="1"/>
<text x="790" y="612" fill="#0f172a" font-size="9" font-weight="600" text-anchor="middle">状态维护</text>
<text x="790" y="630" fill="#64748b" font-size="8" text-anchor="middle">映射表消耗内存</text>
</svg>