<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 920">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', monospace; }
  </style>
  
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0891b2"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="550" y="35" fill="#0f172a" font-size="18" font-weight="700" text-anchor="middle">UDP P2P 打洞流程 (Port Restricted Cone NAT)</text>
  <text x="550" y="55" fill="#64748b" font-size="11" text-anchor="middle">双方互发建立映射 — NAT 之间互相沉默，映射只靠出站包创建</text>

  <!-- ============ ACTORS (Top) ============ -->
  <!-- Client A -->
  <rect x="50" y="75" width="130" height="50" rx="8" fill="white" stroke="#0891b2" stroke-width="2"/>
  <text x="115" y="98" fill="#0891b2" font-size="11" font-weight="700" text-anchor="middle">Client A</text>
  <text x="115" y="114" fill="#64748b" font-size="9" text-anchor="middle">10.0.0.5:8000</text>

  <!-- NAT A -->
  <rect x="240" y="75" width="140" height="50" rx="8" fill="white" stroke="#d97706" stroke-width="2"/>
  <text x="310" y="98" fill="#d97706" font-size="11" font-weight="700" text-anchor="middle">NAT A</text>
  <text x="310" y="114" fill="#64748b" font-size="9" text-anchor="middle">公网 1.2.3.4</text>

  <!-- Signaling Server -->
  <rect x="470" y="75" width="160" height="50" rx="8" fill="white" stroke="#7c3aed" stroke-width="2"/>
  <text x="550" y="98" fill="#7c3aed" font-size="11" font-weight="700" text-anchor="middle">信令服务器 / STUN</text>
  <text x="550" y="114" fill="#64748b" font-size="9" text-anchor="middle">9.9.9.9:3478</text>

  <!-- NAT B -->
  <rect x="720" y="75" width="140" height="50" rx="8" fill="white" stroke="#d97706" stroke-width="2"/>
  <text x="790" y="98" fill="#d97706" font-size="11" font-weight="700" text-anchor="middle">NAT B</text>
  <text x="790" y="114" fill="#64748b" font-size="9" text-anchor="middle">公网 5.6.7.8</text>

  <!-- Client B -->
  <rect x="920" y="75" width="130" height="50" rx="8" fill="white" stroke="#0891b2" stroke-width="2"/>
  <text x="985" y="98" fill="#0891b2" font-size="11" font-weight="700" text-anchor="middle">Client B</text>
  <text x="985" y="114" fill="#64748b" font-size="9" text-anchor="middle">10.0.0.8:9000</text>

  <!-- Lifelines -->
  <line x1="115" y1="125" x2="115" y2="880" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="310" y1="125" x2="310" y2="880" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="550" y1="125" x2="550" y2="880" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="790" y1="125" x2="790" y2="880" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="985" y1="125" x2="985" y2="880" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ============ PHASE 1: STUN Discovery ============ -->
  <rect x="30" y="145" width="1040" height="175" rx="8" fill="rgba(124,58,237,0.04)" stroke="#7c3aed" stroke-width="1" stroke-dasharray="6,3"/>
  <rect x="30" y="145" width="160" height="22" rx="8" fill="#7c3aed"/>
  <text x="110" y="160" fill="white" font-size="9" font-weight="600" text-anchor="middle">Phase 1: STUN 探测</text>

  <!-- Step 1: A → STUN -->
  <circle cx="72" cy="180" r="10" fill="rgba(8,145,178,0.1)" stroke="#0891b2" stroke-width="1.5"/>
  <text x="72" y="184" fill="#0891b2" font-size="8" font-weight="700" text-anchor="middle">1</text>
  <line x1="115" y1="180" x2="540" y2="180" stroke="#0891b2" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <text x="330" y="173" fill="#0f172a" font-size="9" text-anchor="middle">A 发 STUN Binding Request</text>
  
  <!-- NAT A creates mapping note -->
  <rect x="230" y="190" width="160" height="22" rx="4" fill="rgba(217,119,6,0.08)" stroke="#d97706" stroke-width="1"/>
  <text x="310" y="205" fill="#d97706" font-size="8" font-weight="500" text-anchor="middle">NAT A 映射: :8000→:45000</text>

  <!-- Step 2: STUN replies to A -->
  <circle cx="72" cy="230" r="10" fill="rgba(8,145,178,0.1)" stroke="#0891b2" stroke-width="1.5"/>
  <text x="72" y="234" fill="#0891b2" font-size="8" font-weight="700" text-anchor="middle">2</text>
  <line x1="540" y1="230" x2="125" y2="230" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-purple)"/>
  <text x="330" y="223" fill="#0f172a" font-size="9" text-anchor="middle">STUN 回复: "你的公网是 1.2.3.4:45000"</text>

  <!-- Step 3: B → STUN -->
  <circle cx="1028" cy="270" r="10" fill="rgba(8,145,178,0.1)" stroke="#0891b2" stroke-width="1.5"/>
  <text x="1028" y="274" fill="#0891b2" font-size="8" font-weight="700" text-anchor="middle">3</text>
  <line x1="985" y1="270" x2="560" y2="270" stroke="#0891b2" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <text x="770" y="263" fill="#0f172a" font-size="9" text-anchor="middle">B 发 STUN Binding Request</text>

  <!-- NAT B creates mapping note -->
  <rect x="710" y="280" width="160" height="22" rx="4" fill="rgba(217,119,6,0.08)" stroke="#d97706" stroke-width="1"/>
  <text x="790" y="295" fill="#d97706" font-size="8" font-weight="500" text-anchor="middle">NAT B 映射: :9000→:60000</text>

  <!-- Step 4: STUN replies to B -->
  <circle cx="1028" cy="310" r="10" fill="rgba(8,145,178,0.1)" stroke="#0891b2" stroke-width="1.5"/>
  <text x="1028" y="314" fill="#0891b2" font-size="8" font-weight="700" text-anchor="middle">4</text>
  <line x1="560" y1="310" x2="975" y2="310" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-purple)"/>
  <text x="770" y="303" fill="#0f172a" font-size="9" text-anchor="middle">STUN 回复: "你的公网是 5.6.7.8:60000"</text>

  <!-- ============ PHASE 2: Exchange via Signaling ============ -->
  <rect x="30" y="335" width="1040" height="95" rx="8" fill="rgba(124,58,237,0.04)" stroke="#7c3aed" stroke-width="1" stroke-dasharray="6,3"/>
  <rect x="30" y="335" width="200" height="22" rx="8" fill="#7c3aed"/>
  <text x="130" y="350" fill="white" font-size="9" font-weight="600" text-anchor="middle">Phase 2: 通过信令交换地址</text>

  <!-- Step 5: A tells signaling its address -->
  <circle cx="72" cy="375" r="10" fill="rgba(8,145,178,0.1)" stroke="#0891b2" stroke-width="1.5"/>
  <text x="72" y="379" fill="#0891b2" font-size="8" font-weight="700" text-anchor="middle">5</text>
  <line x1="115" y1="375" x2="540" y2="375" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="330" y="368" fill="#0f172a" font-size="9" text-anchor="middle">A → 信令: "我是 1.2.3.4:45000"</text>

  <!-- Step 6: Signaling forwards to B -->
  <circle cx="1028" cy="410" r="10" fill="rgba(8,145,178,0.1)" stroke="#0891b2" stroke-width="1.5"/>
  <text x="1028" y="414" fill="#0891b2" font-size="8" font-weight="700" text-anchor="middle">6</text>
  <line x1="560" y1="410" x2="975" y2="410" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="770" y="403" fill="#0f172a" font-size="9" text-anchor="middle">信令 → B: "A 地址是 1.2.3.4:45000，B 地址是 5.6.7.8:60000"</text>

  <!-- ============ PHASE 3: Hole Punching ============ -->
  <rect x="30" y="445" width="1040" height="305" rx="8" fill="rgba(22,163,106,0.04)" stroke="#16a34a" stroke-width="1" stroke-dasharray="6,3"/>
  <rect x="30" y="445" width="250" height="22" rx="8" fill="#16a34a"/>
  <text x="155" y="460" fill="white" font-size="9" font-weight="600" text-anchor="middle">Phase 3: 双方互发打洞 (关键!)</text>

  <!-- Step 7: A sends to B (will be dropped by NAT B) -->
  <circle cx="72" cy="490" r="10" fill="rgba(8,145,178,0.1)" stroke="#0891b2" stroke-width="1.5"/>
  <text x="72" y="494" fill="#0891b2" font-size="8" font-weight="700" text-anchor="middle">7</text>
  <line x1="115" y1="490" x2="780" y2="490" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <text x="450" y="483" fill="#0f172a" font-size="9" text-anchor="middle">A 向 5.6.7.8:60000 发 UDP 包 (明知会被丢)</text>

  <!-- NAT A adds B to allow list -->
  <rect x="215" y="500" width="190" height="38" rx="4" fill="rgba(22,163,106,0.08)" stroke="#16a34a" stroke-width="1.5"/>
  <text x="310" y="515" fill="#16a34a" font-size="8" font-weight="600" text-anchor="middle">✓ NAT A 允许列表新增:</text>
  <text x="310" y="530" fill="#16a34a" font-size="8" text-anchor="middle">5.6.7.8:60000 → 放行</text>

  <!-- NAT B drops -->
  <rect x="705" y="500" width="170" height="38" rx="4" fill="rgba(220,38,38,0.08)" stroke="#dc2626" stroke-width="1.5"/>
  <text x="790" y="515" fill="#dc2626" font-size="8" font-weight="600" text-anchor="middle">✗ NAT B 检查入站:</text>
  <text x="790" y="530" fill="#dc2626" font-size="8" text-anchor="middle">1.2.3.4:45000 不在允许列表 → 丢弃</text>

  <!-- Key insight: silent drop -->
  <rect x="700" y="545" width="180" height="20" rx="4" fill="rgba(100,116,139,0.08)" stroke="#64748b" stroke-width="1"/>
  <text x="790" y="559" fill="#64748b" font-size="8" font-weight="500" text-anchor="middle">静默丢弃，不发任何反馈</text>

  <!-- Step 8: B sends to A -->
  <circle cx="1028" cy="590" r="10" fill="rgba(8,145,178,0.1)" stroke="#0891b2" stroke-width="1.5"/>
  <text x="1028" y="594" fill="#0891b2" font-size="8" font-weight="700" text-anchor="middle">8</text>
  <line x1="985" y1="590" x2="320" y2="590" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="650" y="583" fill="#0f172a" font-size="9" text-anchor="middle">B 向 1.2.3.4:45000 发 UDP 包</text>

  <!-- NAT B adds A to allow list -->
  <rect x="705" y="605" width="190" height="38" rx="4" fill="rgba(22,163,106,0.08)" stroke="#16a34a" stroke-width="1.5"/>
  <text x="800" y="620" fill="#16a34a" font-size="8" font-weight="600" text-anchor="middle">✓ NAT B 允许列表新增:</text>
  <text x="800" y="635" fill="#16a34a" font-size="8" text-anchor="middle">1.2.3.4:45000 → 放行</text>

  <!-- NAT A checks and allows! -->
  <rect x="215" y="605" width="190" height="38" rx="4" fill="rgba(22,163,106,0.12)" stroke="#16a34a" stroke-width="2"/>
  <text x="310" y="620" fill="#16a34a" font-size="8" font-weight="700" text-anchor="middle">✓ NAT A 检查入站:</text>
  <text x="310" y="635" fill="#16a34a" font-size="8" text-anchor="middle">源 5.6.7.8:60000 在 Step7 加的 → 放行!</text>

  <!-- Arrow continues to Client A -->
  <line x1="310" y1="660" x2="125" y2="660" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="215" y="653" fill="#16a34a" font-size="9" font-weight="600" text-anchor="middle">→ 到达 Client A ✓</text>

  <!-- Step 9: Now A can also reach B -->
  <circle cx="72" cy="700" r="10" fill="rgba(8,145,178,0.1)" stroke="#0891b2" stroke-width="1.5"/>
  <text x="72" y="704" fill="#0891b2" font-size="8" font-weight="700" text-anchor="middle">9</text>
  <line x1="115" y1="700" x2="975" y2="700" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="550" y="693" fill="#0f172a" font-size="9" text-anchor="middle">A 再发包给 B → NAT B 检查: 源 1.2.3.4:45000 在 Step8 加的 → 放行 → 到达 B ✓</text>

  <!-- Success note -->
  <rect x="420" y="720" width="260" height="22" rx="6" fill="rgba(22,163,106,0.12)" stroke="#16a34a" stroke-width="2"/>
  <text x="550" y="735" fill="#16a34a" font-size="10" font-weight="700" text-anchor="middle">🎉 双向通道建立，打洞成功!</text>

  <!-- ============ KEY INSIGHTS ============ -->
  <rect x="30" y="770" width="1040" height="130" rx="8" fill="rgba(37,99,235,0.04)" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="30" y="770" width="100" height="22" rx="8" fill="#2563eb"/>
  <text x="80" y="785" fill="white" font-size="9" font-weight="600" text-anchor="middle">核心原理</text>

  <!-- Insight 1 -->
  <circle cx="60" cy="810" r="6" fill="#2563eb"/>
  <text x="75" y="814" fill="#0f172a" font-size="9" font-weight="600">出站包无条件创建映射</text>
  <text x="75" y="828" fill="#64748b" font-size="8">NAT 不关心包能否到达对端。A 发出去那一刻，A 的 NAT 就把 B 加入允许列表。</text>

  <!-- Insight 2 -->
  <circle cx="60" cy="850" r="6" fill="#2563eb"/>
  <text x="75" y="854" fill="#0f172a" font-size="9" font-weight="600">远端 NAT 静默丢弃，不产生 ICMP</text>
  <text x="75" y="868" fill="#64748b" font-size="8">Step 7 的包被 B 的 NAT 丢，但不反馈 → A 的 NAT 感知不到 → 映射保留（这是打洞能成立的前提）。</text>

  <!-- Insight 3 -->
  <circle cx="60" cy="890" r="6" fill="#2563eb"/>
  <text x="75" y="894" fill="#0f172a" font-size="9" font-weight="600">Symmetric NAT 下此流程失败</text>
  <text x="75" y="908" fill="#64748b" font-size="8">因为 A 向 STUN 分配 :45000，向 B 会分配 :45001。B 拿到的 :45000 找不到 A 的映射。</text>

</svg>
