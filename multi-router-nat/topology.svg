<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 720">
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', 'SF Mono', monospace; }
</style>
<defs>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
  </pattern>
  <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
  </marker>
  <marker id="arrow-teal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#0d9488"/>
  </marker>
  <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
  </marker>
  <marker id="arrow-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#e11d48"/>
  </marker>
  <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
  </marker>
</defs>

<!-- Background -->
<rect width="100%" height="100%" fill="#f8fafc"/>
<rect width="100%" height="100%" fill="url(#grid)"/>

<!-- Title -->
<text x="40" y="36" fill="#1e293b" font-size="16" font-weight="700">多级路由器 LAN 拓扑 — 双NAT通信分析</text>
<text x="40" y="54" fill="#64748b" font-size="9" font-weight="400">Multi-Router NAT Topology &amp; Communication Analysis</text>

<!-- ======================== -->
<!-- REGION: 192.168.1.0/24  -->
<!-- ======================== -->
<rect x="60" y="80" width="760" height="260" rx="12" fill="rgba(16,185,129,0.04)" stroke="#10b981" stroke-width="1.2" stroke-dasharray="8,4"/>
<text x="76" y="98" fill="#059669" font-size="9" font-weight="600">子网: 192.168.1.0/24 (光猫LAN侧)</text>

<!-- Internet Cloud -->
<rect x="350" y="105" width="160" height="50" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
<text x="430" y="128" fill="#334155" font-size="11" font-weight="600" text-anchor="middle">互联网 (WAN)</text>
<text x="430" y="143" fill="#94a3b8" font-size="9" text-anchor="middle">Internet</text>

<!-- Arrow: Internet → 光猫 -->
<line x1="430" y1="155" x2="430" y2="185" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- 光猫 -->
<rect x="330" y="190" width="200" height="65" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
<text x="430" y="215" fill="#064e3b" font-size="12" font-weight="600" text-anchor="middle">光猫 (主路由器)</text>
<text x="430" y="232" fill="#047857" font-size="9" text-anchor="middle">Gateway: 192.168.1.1</text>
<text x="430" y="246" fill="#047857" font-size="9" text-anchor="middle">DHCP Server: 192.168.1.0/24</text>

<!-- Arrow: 光猫 → 设备C -->
<line x1="350" y1="255" x2="200" y2="290" stroke="#10b981" stroke-width="1.2" marker-end="url(#arrow-teal)"/>

<!-- Arrow: 光猫 → 路由器A WAN -->
<line x1="510" y1="255" x2="650" y2="290" stroke="#2563eb" stroke-width="1.2" marker-end="url(#arrow-blue)"/>

<!-- 设备C (直连光猫) -->
<rect x="100" y="290" width="180" height="65" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
<text x="190" y="313" fill="#064e3b" font-size="11" font-weight="600" text-anchor="middle">设备 C</text>
<text x="190" y="330" fill="#047857" font-size="9" text-anchor="middle">IP: 192.168.1.100</text>
<text x="190" y="344" fill="#047857" font-size="9" text-anchor="middle">网关: 192.168.1.1</text>

<!-- ================================ -->
<!-- 路由器A WAN侧 (在1.0网段内)      -->
<!-- ================================ -->
<rect x="570" y="290" width="200" height="65" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
<text x="670" y="313" fill="#1e3a5f" font-size="11" font-weight="600" text-anchor="middle">路由器 A (WAN侧)</text>
<text x="670" y="330" fill="#1d4ed8" font-size="9" text-anchor="middle">WAN IP: 192.168.1.2 (DHCP)</text>
<text x="670" y="344" fill="#1d4ed8" font-size="9" text-anchor="middle">网关: 192.168.1.1</text>

<!-- ========================== -->
<!-- NAT 转换标记               -->
<!-- ========================== -->
<rect x="625" y="370" width="90" height="28" rx="4" fill="#fff1f2" stroke="#e11d48" stroke-width="1.5"/>
<text x="670" y="388" fill="#e11d48" font-size="10" font-weight="600" text-anchor="middle">NAT</text>

<!-- Arrow: 路由器A WAN → NAT → LAN -->
<line x1="670" y1="355" x2="670" y2="370" stroke="#e11d48" stroke-width="1.5"/>
<line x1="670" y1="398" x2="670" y2="420" stroke="#e11d48" stroke-width="1.5" marker-end="url(#arrow-rose)"/>

<!-- ========================== -->
<!-- REGION: 192.168.2.0/24    -->
<!-- ========================== -->
<rect x="460" y="425" width="380" height="210" rx="12" fill="rgba(37,99,235,0.03)" stroke="#2563eb" stroke-width="1.2" stroke-dasharray="8,4"/>
<text x="476" y="443" fill="#1d4ed8" font-size="9" font-weight="600">子网: 192.168.2.0/24 (路由器A LAN侧)</text>

<!-- 路由器A LAN侧 -->
<rect x="590" y="455" width="160" height="50" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
<text x="670" y="476" fill="#1e3a5f" font-size="11" font-weight="600" text-anchor="middle">路由器 A (LAN侧)</text>
<text x="670" y="493" fill="#1d4ed8" font-size="9" text-anchor="middle">LAN IP: 192.168.2.1</text>

<!-- Arrows to devices -->
<line x1="620" y1="505" x2="560" y2="545" stroke="#2563eb" stroke-width="1" marker-end="url(#arrow-blue)"/>
<line x1="720" y1="505" x2="760" y2="545" stroke="#2563eb" stroke-width="1" marker-end="url(#arrow-blue)"/>

<!-- 设备A -->
<rect x="480" y="550" width="170" height="65" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
<text x="565" y="573" fill="#1e3a5f" font-size="11" font-weight="600" text-anchor="middle">设备 A</text>
<text x="565" y="590" fill="#1d4ed8" font-size="9" text-anchor="middle">IP: 192.168.2.10</text>
<text x="565" y="604" fill="#1d4ed8" font-size="9" text-anchor="middle">网关: 192.168.2.1</text>

<!-- 设备B -->
<rect x="680" y="550" width="140" height="65" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
<text x="750" y="573" fill="#1e3a5f" font-size="11" font-weight="600" text-anchor="middle">设备 B</text>
<text x="750" y="590" fill="#1d4ed8" font-size="9" text-anchor="middle">IP: 192.168.2.11</text>
<text x="750" y="604" fill="#1d4ed8" font-size="9" text-anchor="middle">网关: 192.168.2.1</text>

<!-- ========================== -->
<!-- 通信方向标注               -->
<!-- ========================== -->

<!-- 设备A → 设备C (可通, 绿色虚线) -->
<path d="M 480,575 C 380,575 300,480 240,355" fill="none" stroke="#059669" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arrow-emerald)"/>
<rect x="280" y="450" width="110" height="22" rx="4" fill="#ecfdf5" stroke="#059669" stroke-width="1"/>
<text x="335" y="464" fill="#059669" font-size="9" font-weight="500" text-anchor="middle">可通 (SNAT)</text>

<!-- 设备C → 设备A (不通, 红色虚线) -->
<path d="M 280,330 C 380,350 420,450 480,570" fill="none" stroke="#e11d48" stroke-width="1.8" stroke-dasharray="4,4" marker-end="url(#arrow-rose)"/>
<rect x="345" y="490" width="115" height="22" rx="4" fill="#fff1f2" stroke="#e11d48" stroke-width="1"/>
<text x="402" y="504" fill="#e11d48" font-size="9" font-weight="500" text-anchor="middle">不通 (NAT阻挡)</text>

<!-- X mark on the blocked path -->
<text x="390" y="420" fill="#e11d48" font-size="16" font-weight="700" text-anchor="middle">✕</text>

<!-- ========================== -->
<!-- Legend                      -->
<!-- ========================== -->
<rect x="60" y="650" width="760" height="55" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>

<line x1="90" y1="672" x2="130" y2="672" stroke="#059669" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-emerald)"/>
<text x="140" y="676" fill="#475569" font-size="9">可通: 经NAT转换后单向可达</text>

<line x1="380" y1="672" x2="420" y2="672" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrow-rose)"/>
<text x="430" y="676" fill="#475569" font-size="9">不通: 光猫无路由 + NAT阻挡入站连接</text>

<rect x="90" y="688" width="10" height="10" rx="2" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
<text x="110" y="698" fill="#475569" font-size="9">192.168.1.0/24 设备</text>

<rect x="300" y="688" width="10" height="10" rx="2" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
<text x="320" y="698" fill="#475569" font-size="9">192.168.2.0/24 设备</text>

<rect x="520" y="688" width="10" height="10" rx="2" fill="#fff1f2" stroke="#e11d48" stroke-width="1"/>
<text x="540" y="698" fill="#475569" font-size="9">NAT 边界 (地址转换)</text>

</svg>